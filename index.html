<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor Institucional — EES N° 1 Azurduy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --header-bg: #0f172a;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── OVERLAY DE ACCESO ── */
    #access-overlay {
      display: none;
      position: fixed; inset: 0;
      background: #0f172a;
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #access-overlay.visible { display: flex; }

    .access-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      margin: 1rem;
    }
    .access-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .access-logo .esc-nombre {
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .access-logo .esc-titulo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--header-bg);
      letter-spacing: -.02em;
      margin-top: .25rem;
    }
    .access-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .field-label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .35rem;
    }
    .field-input {
      width: 100%;
      padding: .65rem .85rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .95rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
    }
    .btn-acceder {
      width: 100%;
      margin-top: 1.1rem;
      padding: .72rem 1rem;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-acceder:hover { background: #1e40af; }
    .access-error {
      margin-top: .85rem;
      padding: .55rem .8rem;
      background: #fee2e2;
      color: #991b1b;
      border-radius: var(--radius);
      font-size: .82rem;
      display: none;
    }
    .access-error.visible { display: block; }

    /* ── HEADER ── */
    header {
      background: var(--header-bg);
      color: #f8fafc;
      padding: 0 1.5rem;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .h-left .h-sub {
      font-size: .68rem; color: #94a3b8;
      text-transform: uppercase; letter-spacing: .07em; font-weight: 500;
    }
    .h-left .h-title {
      font-size: 1rem; font-weight: 700; letter-spacing: -.01em; margin-top: 1px;
    }
    .h-right { display: flex; align-items: center; gap: .65rem; flex-shrink: 0; }
    #status-txt { font-size: .72rem; color: #64748b; white-space: nowrap; }
    #status-txt.updating { color: #60a5fa; }
    .btn-icon {
      background: rgba(255,255,255,.1); border: none; color: #cbd5e1;
      width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
      font-size: .95rem; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .btn-icon:hover { background: rgba(255,255,255,.18); color: #fff; }
    .btn-salir {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
      color: #94a3b8; padding: .28rem .75rem; border-radius: 6px;
      font-size: .75rem; font-family: inherit; cursor: pointer;
      transition: background .15s; white-space: nowrap;
    }
    .btn-salir:hover { background: rgba(255,255,255,.14); color: #e2e8f0; }

    /* ── MAIN ── */
    main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }

    /* ── STATS ── */
    .stats { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: 1.2rem; }
    .stat {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: .55rem .9rem;
      display: flex; align-items: center; gap: .45rem;
      box-shadow: var(--shadow);
    }
    .stat.primary { border-color: #cbd5e1; }
    .stat.dim { opacity: .55; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .stat-n { font-size: 1.15rem; font-weight: 800; color: var(--header-bg); line-height: 1; }
    .stat-l { font-size: .7rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .05em; }

    /* ── FILTROS ── */
    .filtros { display: flex; flex-wrap: wrap; gap: .45rem; margin-bottom: 1rem; }
    .pill {
      padding: .35rem .95rem; border-radius: 999px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text-muted); font-size: .76rem;
      font-weight: 500; cursor: pointer; font-family: inherit;
      transition: all .12s;
    }
    .pill:hover { border-color: #94a3b8; color: var(--text); }
    .pill.active { background: #0f172a; color: #fff; border-color: #0f172a; }

    /* ── TABLA ── */
    .tabla-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow);
    }
    .tabla-header {
      padding: .75rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .tabla-header h2 { font-size: .85rem; font-weight: 700; color: var(--text); }
    .tabla-header .count { font-size: .75rem; color: var(--text-muted); }
    .tabla-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    thead th {
      background: #0f172a; color: #fff; padding: .65rem .9rem;
      text-align: left; font-size: .7rem; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase; white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f1f5f9; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    td { padding: .7rem .9rem; vertical-align: middle; }
    .td-acta { color: var(--text-muted); font-size: .78rem; white-space: nowrap; }
    .td-espacio { font-weight: 500; max-width: 260px; }
    .td-doc { max-width: 180px; color: var(--text-muted); }
    .td-fecha { white-space: nowrap; font-size: .78rem; color: var(--text-muted); }
    .td-notas { max-width: 180px; font-size: .78rem; color: var(--text-muted); }
    .notas-clip {
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .dash { color: var(--text-dim); }

    .empty {
      text-align: center; padding: 2.5rem 1rem; color: var(--text-muted);
    }
    .empty .empty-ico { font-size: 1.8rem; margin-bottom: .4rem; }

    /* ── BADGE ESTADO ── */
    .badge {
      display: inline-block; padding: .2rem .55rem; border-radius: 999px;
      font-size: .7rem; font-weight: 700; white-space: nowrap;
    }

    /* ── ÚLTIMOS CERRADOS ── */
    .cerrados { margin-top: 1.75rem; }
    .cerrados-head {
      display: flex; align-items: center; gap: .5rem; margin-bottom: .7rem;
    }
    .cerrados-head h3 {
      font-size: .75rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em; white-space: nowrap;
    }
    .cerrados-head .linea { flex: 1; height: 1px; background: var(--border); }
    .cerrados-cards { display: flex; flex-wrap: wrap; gap: .6rem; }
    .cc {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: .7rem .9rem;
      flex: 1; min-width: 180px; max-width: 340px; box-shadow: var(--shadow);
    }
    .cc-esp {
      font-size: .85rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: .3rem;
    }
    .cc-meta { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }
    .cc-doc { font-size: .76rem; color: var(--text-muted); }
    .cc-fecha { font-size: .73rem; color: var(--text-dim); margin-left: auto; }

    @media (max-width: 680px) {
      .col-toma, .col-notas { display: none; }
      .h-left .h-sub, #status-txt { display: none; }
      main { padding: 1rem .75rem 2rem; }
    }
  </style>
</head>
<body>

<!-- OVERLAY DE ACCESO -->
<div id="access-overlay" role="dialog" aria-modal="true">
  <div class="access-card">
    <div class="access-logo">
      <div class="esc-nombre">EES N° 1 · Tierra del Fuego</div>
      <div class="esc-titulo">Juana Azurduy</div>
    </div>
    <h2>Clave de acceso institucional</h2>
    <label class="field-label" for="inp-clave">Clave</label>
    <input type="password" id="inp-clave" class="field-input"
           placeholder="••••••••••••" autocomplete="current-password" />
    <button class="btn-acceder" id="btn-acceder" type="button">Ingresar</button>
    <div class="access-error" id="access-error">Clave incorrecta. Consultá a la secretaría.</div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="h-left">
    <div class="h-sub">Escuela de Educación Secundaria N° 1 — Azurduy</div>
    <div class="h-title">Visor institucional</div>
  </div>
  <div class="h-right">
    <span id="status-txt"></span>
    <button class="btn-icon" id="btn-refresh" title="Actualizar">&#x21BB;</button>
    <button class="btn-salir" id="btn-salir" type="button">Cerrar sesión</button>
  </div>
</header>

<!-- CONTENIDO -->
<main id="main" style="display:none">

  <div class="stats" id="stats"></div>

  <div class="filtros" id="filtros"></div>

  <div class="tabla-card">
    <div class="tabla-header">
      <h2 id="tabla-titulo">Ofrecimientos</h2>
      <span class="count" id="tabla-count"></span>
    </div>
    <div class="tabla-scroll">
      <table>
        <thead>
          <tr>
            <th>Acta / Llam.</th>
            <th>Espacio / Cargo</th>
            <th>Estado</th>
            <th>Docente</th>
            <th class="col-toma">Toma efectiva</th>
            <th class="col-notas">Notas</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <section class="cerrados" id="cerrados" style="display:none">
    <div class="cerrados-head">
      <h3>Últimos cerrados</h3>
      <div class="linea"></div>
    </div>
    <div class="cerrados-cards" id="cerrados-cards"></div>
  </section>

</main>

<script>
  // ── CONFIG ────────────────────────────────────────────────────
  var CSV_URL   = 'https://idgaitan.github.io/azurduy-visor/ofrecimientos.csv';
  var AUTH_KEY  = 'visor_ok';
  var CLAVE     = 'Juana29092026';

  // ── ESTADOS ──────────────────────────────────────────────────
  var EST = {
    APERTURA:          { l: 'Apertura',          bg: '#dbeafe', c: '#1d4ed8', d: '#3b82f6' },
    EN_OFRECIMIENTO:   { l: 'En ofrecimiento',   bg: '#fef9c3', c: '#854d0e', d: '#eab308' },
    EN_ENTREVISTAS:    { l: 'En entrevistas',     bg: '#ffedd5', c: '#9a3412', d: '#f97316' },
    EN_ACEPTACION:     { l: 'En aceptación',      bg: '#ede9fe', c: '#5b21b6', d: '#8b5cf6' },
    CUBIERTO_SIN_TOMA: { l: 'Cubierto sin toma', bg: '#dcfce7', c: '#166534', d: '#22c55e' },
    FINALIZADO:        { l: 'Finalizado',         bg: '#e2e8f0', c: '#334155', d: '#94a3b8' },
    DESIERTO:          { l: 'Desierto',           bg: '#fee2e2', c: '#991b1b', d: '#ef4444' },
  };
  var ACTIVOS  = ['APERTURA','EN_OFRECIMIENTO','EN_ENTREVISTAS','EN_ACEPTACION','CUBIERTO_SIN_TOMA'];
  var CERRADOS = ['FINALIZADO','DESIERTO'];
  var FILTROS  = [
    { k: 'en_curso', l: 'En curso' },
    { k: 'APERTURA', l: 'Apertura' },
    { k: 'EN_OFRECIMIENTO',   l: 'En ofrecimiento' },
    { k: 'EN_ENTREVISTAS',    l: 'En entrevistas' },
    { k: 'EN_ACEPTACION',     l: 'En aceptación' },
    { k: 'CUBIERTO_SIN_TOMA', l: 'Cubierto sin toma' },
    { k: 'DESIERTO',          l: 'Desierto' },
    { k: 'todos',             l: 'Todos' },
  ];

  // ── ESTADO ───────────────────────────────────────────────────
  var rows   = [];
  var filtro = 'en_curso';

  // ── DOM ───────────────────────────────────────────────────────
  var overlay     = document.getElementById('access-overlay');
  var inpClave    = document.getElementById('inp-clave');
  var btnAcceder  = document.getElementById('btn-acceder');
  var accError    = document.getElementById('access-error');
  var mainEl      = document.getElementById('main');
  var statusTxt   = document.getElementById('status-txt');
  var btnRefresh  = document.getElementById('btn-refresh');
  var btnSalir    = document.getElementById('btn-salir');
  var statsEl     = document.getElementById('stats');
  var filtrosEl   = document.getElementById('filtros');
  var tbodyEl     = document.getElementById('tbody');
  var tablaTitulo = document.getElementById('tabla-titulo');
  var tablaCount  = document.getElementById('tabla-count');
  var cerradosEl  = document.getElementById('cerrados');
  var cerradosCards = document.getElementById('cerrados-cards');

  // ── AUTH ─────────────────────────────────────────────────────
  function autenticado() { return sessionStorage.getItem(AUTH_KEY) === '1'; }
  function setAuth()     { sessionStorage.setItem(AUTH_KEY, '1'); }
  function clearAuth()   { sessionStorage.removeItem(AUTH_KEY); }

  function mostrarOverlay() {
    overlay.classList.add('visible');
    mainEl.style.display = 'none';
    setTimeout(function() { inpClave.focus(); }, 80);
  }
  function ocultarOverlay() {
    overlay.classList.remove('visible');
    mainEl.style.display = 'block';
  }

  function verificarClave() {
    if (inpClave.value === CLAVE) {
      accError.classList.remove('visible');
      setAuth();
      inpClave.value = '';
      ocultarOverlay();
      cargarCSV();
    } else {
      accError.classList.add('visible');
      inpClave.select();
    }
  }

  btnAcceder.addEventListener('click', verificarClave);
  inpClave.addEventListener('keydown', function(e) { if (e.key === 'Enter') verificarClave(); });
  btnSalir.addEventListener('click', function() { clearAuth(); rows = []; mostrarOverlay(); });
  btnRefresh.addEventListener('click', cargarCSV);

  // ── CSV ───────────────────────────────────────────────────────
  function cargarCSV() {
    setStatus('Actualizando…', true);
    fetch(CSV_URL + '?t=' + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function(txt) {
        rows = parsearCSV(txt).filter(function(r) { return r.estado !== 'ANULADO'; });
        renderTodo();
        var h = new Date().getHours(), m = new Date().getMinutes();
        setStatus('Actualizado ' + pad(h) + ':' + pad(m), false);
      })
      .catch(function(e) {
        setStatus('Error al cargar datos', false);
      });
  }

  function parsearCSV(txt) {
    var lines = txt.trim().split('\n');
    if (lines.length < 2) return [];
    var hdrs = parsearLinea(lines[0]);
    var result = [];
    for (var i = 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      var vals = parsearLinea(lines[i]);
      var obj = {};
      for (var j = 0; j < hdrs.length; j++) obj[hdrs[j]] = vals[j] || '';
      result.push(obj);
    }
    return result;
  }

  function parsearLinea(line) {
    var r = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { r.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    r.push(cur.trim());
    return r;
  }

  function setStatus(msg, updating) {
    statusTxt.textContent = msg;
    statusTxt.className = updating ? 'updating' : '';
  }

  // ── RENDER ────────────────────────────────────────────────────
  function renderTodo() {
    renderStats();
    renderFiltros();
    renderTabla();
    renderCerrados();
  }

  function renderStats() {
    statsEl.innerHTML = '';
    var activoCnt = rows.filter(function(r) { return ACTIVOS.indexOf(r.estado) !== -1; }).length;
    var finCnt    = rows.filter(function(r) { return r.estado === 'FINALIZADO'; }).length;
    var desCnt    = rows.filter(function(r) { return r.estado === 'DESIERTO';   }).length;

    if (activoCnt > 0) agregarStat(activoCnt, 'En curso', null, true, false);
    for (var i = 0; i < ACTIVOS.length; i++) {
      var key = ACTIVOS[i];
      var cnt = rows.filter(function(r) { return r.estado === key; }).length;
      if (cnt > 0) agregarStat(cnt, EST[key].l, EST[key].d, false, false);
    }
    if (finCnt > 0) agregarStat(finCnt, 'Finalizado', EST.FINALIZADO.d, false, true);
    if (desCnt > 0) agregarStat(desCnt, 'Desierto',   EST.DESIERTO.d,   false, true);
  }

  function agregarStat(n, lbl, dot, primary, dim) {
    var d = document.createElement('div');
    d.className = 'stat' + (primary ? ' primary' : '') + (dim ? ' dim' : '');
    if (dot) {
      var sp = document.createElement('span');
      sp.className = 'stat-dot'; sp.style.background = dot;
      d.appendChild(sp);
    }
    var nEl = document.createElement('span'); nEl.className = 'stat-n'; nEl.textContent = n;
    var lEl = document.createElement('span'); lEl.className = 'stat-l'; lEl.textContent = lbl;
    d.appendChild(nEl); d.appendChild(lEl);
    statsEl.appendChild(d);
  }

  function renderFiltros() {
    filtrosEl.innerHTML = '';
    for (var i = 0; i < FILTROS.length; i++) {
      (function(f) {
        var b = document.createElement('button');
        b.className = 'pill' + (filtro === f.k ? ' active' : '');
        b.textContent = f.l;
        b.addEventListener('click', function() {
          filtro = f.k; renderFiltros(); renderTabla();
        });
        filtrosEl.appendChild(b);
      })(FILTROS[i]);
    }
  }

  function renderTabla() {
    var filt = filtrar(rows, filtro);
    var lbl = '';
    for (var i = 0; i < FILTROS.length; i++) { if (FILTROS[i].k === filtro) { lbl = FILTROS[i].l; break; } }
    tablaTitulo.textContent = lbl ? 'Ofrecimientos — ' + lbl : 'Ofrecimientos';
    tablaCount.textContent  = filt.length + ' registro' + (filt.length !== 1 ? 's' : '');

    tbodyEl.innerHTML = '';
    if (!filt.length) {
      var tr = document.createElement('tr');
      var td = document.createElement('td'); td.colSpan = 6;
      td.innerHTML = '<div class="empty"><div class="empty-ico">📋</div><p>Sin registros para este filtro.</p></div>';
      tr.appendChild(td); tbodyEl.appendChild(tr);
      return;
    }
    for (var j = 0; j < filt.length; j++) tbodyEl.appendChild(hacerFila(filt[j]));
  }

  function filtrar(rs, k) {
    if (k === 'todos')    return rs;
    if (k === 'en_curso') return rs.filter(function(r) { return ACTIVOS.indexOf(r.estado) !== -1; });
    return rs.filter(function(r) { return r.estado === k; });
  }

  function hacerFila(r) {
    var tr = document.createElement('tr');

    // Acta / llamado
    var tdA = document.createElement('td'); tdA.className = 'td-acta';
    tdA.innerHTML = esc(r.acta_nro || '—') +
      (r.llamado ? '<br><span style="font-size:.72rem;color:#94a3b8">Llam. ' + esc(r.llamado) + '</span>' : '');
    tr.appendChild(tdA);

    // Espacio
    var tdE = document.createElement('td'); tdE.className = 'td-espacio';
    tdE.textContent = r.espacio_cargo || '—';
    tr.appendChild(tdE);

    // Estado
    var tdS = document.createElement('td');
    var info = EST[r.estado] || { l: r.estado, bg: '#f1f5f9', c: '#475569' };
    tdS.innerHTML = '<span class="badge" style="background:' + info.bg + ';color:' + info.c + '">' + esc(info.l) + '</span>';
    tr.appendChild(tdS);

    // Docente
    var tdD = document.createElement('td'); tdD.className = 'td-doc';
    tdD.innerHTML = r.docente_acepto ? esc(r.docente_acepto) : '<span class="dash">—</span>';
    tr.appendChild(tdD);

    // Toma efectiva
    var tdT = document.createElement('td'); tdT.className = 'td-fecha col-toma';
    var toma = fmtFecha(r.fecha_toma);
    tdT.innerHTML = toma ? esc(toma) : '<span class="dash">—</span>';
    tr.appendChild(tdT);

    // Notas
    var tdN = document.createElement('td'); tdN.className = 'td-notas col-notas';
    if (r.notas) {
      tdN.innerHTML = '<span class="notas-clip" title="' + esc(r.notas) + '">' + esc(r.notas) + '</span>';
    } else {
      tdN.innerHTML = '<span class="dash">—</span>';
    }
    tr.appendChild(tdN);

    return tr;
  }

  function renderCerrados() {
    // Los más recientes primero: el CSV viene ordenado por acta_nro asc, invertimos
    var cerr = rows.filter(function(r) { return CERRADOS.indexOf(r.estado) !== -1; });
    cerr = cerr.slice().reverse().slice(0, 3);   // últimos 3 por acta_nro desc
    if (!cerr.length) { cerradosEl.style.display = 'none'; return; }
    cerradosEl.style.display = 'block';
    cerradosCards.innerHTML = '';
    for (var i = 0; i < cerr.length; i++) {
      var r = cerr[i];
      var info = EST[r.estado] || { l: r.estado, bg: '#f1f5f9', c: '#475569' };
      var fecha = r.estado === 'FINALIZADO' ? fmtFecha(r.fecha_toma) : fmtFecha(r.fecha);
      var card = document.createElement('div'); card.className = 'cc';
      card.innerHTML =
        '<div class="cc-esp" title="' + esc(r.espacio_cargo || '') + '">' + esc(r.espacio_cargo || '—') + '</div>' +
        '<div class="cc-meta">' +
          '<span class="badge" style="background:' + info.bg + ';color:' + info.c + '">' + esc(info.l) + '</span>' +
          '<span class="cc-doc">' + esc(r.docente_acepto || '—') + '</span>' +
          (fecha ? '<span class="cc-fecha">' + esc(fecha) + '</span>' : '') +
        '</div>';
      cerradosCards.appendChild(card);
    }
  }

  // ── UTILS ─────────────────────────────────────────────────────
  function fmtFecha(s) {
    if (!s) return '';
    var p = s.slice(0,10).split('-');
    return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : s;
  }
  function pad(n) { return String(n).padStart(2,'0'); }
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── INIT ──────────────────────────────────────────────────────
  if (autenticado()) { ocultarOverlay(); cargarCSV(); }
  else               { mostrarOverlay(); }
</script>
